# .github/workflows/release.yml
name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 0.2.3)'
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update manifest version
        run: |
          VERSION="${{ github.event.inputs.version }}"
          MANIFEST="custom_components/calendar_merge/manifest.json"
          # Use jq to safely update the version field
          jq --arg v "$VERSION" '.version = $v' "$MANIFEST" > tmp.json
          mv tmp.json "$MANIFEST"
          echo "Updated manifest to version $VERSION"
          cat "$MANIFEST"

      - name: Commit and tag
        run: |
          VERSION="${{ github.event.inputs.version }}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add custom_components/calendar_merge/manifest.json
          git commit -m "chore: bump version to $VERSION"
          git tag "v$VERSION"
          git push origin main
          git push origin "v$VERSION"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: v${{ github.event.inputs.version }}
          generate_release_notes: true
